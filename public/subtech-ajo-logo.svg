<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <!-- Amber gradient for the icon -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59F0C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8890A;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === ICON MARK: rotating circle / ajo cycle === -->
  <!-- Outer ring (dark base) -->
  <circle cx="30" cy="30" r="26" fill="#0F1B2D" stroke="#1E3048" stroke-width="1.5"/>

  <!-- Rotating arc segments representing Ajo cycle -->
  <!-- Segment 1 - amber (active) -->
  <path d="M30 6 A24 24 0 0 1 50.78 17" stroke="#F59F0C" stroke-width="3.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Segment 2 -->
  <path d="M51.5 18.5 A24 24 0 0 1 54 30" stroke="#F59F0C" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <!-- Segment 3 -->
  <path d="M53.5 32 A24 24 0 0 1 44 49" stroke="#2A4A6B" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Segment 4 -->
  <path d="M42 50.5 A24 24 0 0 1 18 50.5" stroke="#2A4A6B" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Segment 5 -->
  <path d="M16 49 A24 24 0 0 1 6.5 32" stroke="#1E3A55" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Segment 6 -->
  <path d="M6 29 A24 24 0 0 1 9.22 17" stroke="#1E3A55" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Center naira / A symbol -->
  <text x="30" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#F59F0C" filter="url(#glow)">₦</text>

  <!-- Small node dots on the ring -->
  <circle cx="30" cy="6" r="2.5" fill="#F59F0C"/>
  <circle cx="54" cy="30" r="2.5" fill="#F59F0C" opacity="0.6"/>
  <circle cx="44" cy="50" r="2.5" fill="#2A4A6B"/>
  <circle cx="16" cy="50" r="2.5" fill="#2A4A6B"/>
  <circle cx="6" cy="30" r="2.5" fill="#1E3A55"/>
  <circle cx="16" cy="10" r="2.5" fill="#1E3A55"/>

  <!-- === WORDMARK === -->
  <!-- "Subtech" in white -->
  <text x="66" y="24" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2">SUBTECH</text>

  <!-- Thin amber divider line -->
  <rect x="66" y="28" width="104" height="1.2" fill="#F59F0C" rx="1"/>

  <!-- "Ajo" large, bold, amber -->
  <text x="65" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#F59F0C" letter-spacing="-0.5">Ajo</text>

  <!-- "Solution" smaller, white, beside Ajo -->
  <text x="107" y="50" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="13" font-weight="400" fill="#CBD5E1" letter-spacing="1">Solution</text>
</svg>
